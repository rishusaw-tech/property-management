# ============================================================
# PMFMS - Application Configuration
# Every sensitive/environment-specific value is injected via
# environment variables with sensible development defaults.
# ============================================================
spring.application.name=pmfms-backend
server.port=${SERVER_PORT:8080}

# ---------- Database (H2 file-based by default; switch to MySQL via env) ----------
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/pmfms;MODE=LEGACY}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Schema is owned by Flyway migrations; Hibernate only validates it
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---------- Flyway DB migrations ----------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---------- H2 console (development only - disable in production) ----------
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# ---------- JWT ----------
# JWT_SECRET must be at least 32 chars (256-bit) - ALWAYS override in production
app.jwt.secret=${JWT_SECRET:change-me-please-32-characters-minimum-dev-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ---------- Password reset ----------
app.password-reset.expiration-ms=${RESET_TOKEN_EXPIRATION_MS:900000}
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:http://localhost:3000/reset-password}

# ---------- CORS ----------
# Comma-separated list of allowed origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ---------- Work order SLA hours per priority (BRD 9.3 / 16.3) ----------
app.sla.critical-hours=${SLA_CRITICAL_HOURS:4}
app.sla.high-hours=${SLA_HIGH_HOURS:24}
app.sla.medium-hours=${SLA_MEDIUM_HOURS:72}
app.sla.low-hours=${SLA_LOW_HOURS:168}

# ---------- Schedulers (cron) ----------
app.scheduler.invoice-overdue-cron=${INVOICE_OVERDUE_CRON:0 30 0 * * *}
app.scheduler.lease-renewal-cron=${LEASE_RENEWAL_CRON:0 0 1 * * *}
app.scheduler.compliance-status-cron=${COMPLIANCE_STATUS_CRON:0 15 0 * * *}

# ---------- springdoc / Swagger ----------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
